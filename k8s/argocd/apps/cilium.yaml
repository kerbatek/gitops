apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.17.1
      helm:
        valuesObject:
          kubeProxyReplacement: true
          k8sServiceHost: "10.0.215.5"
          k8sServicePort: "6443"
          ipam:
            mode: kubernetes
          bgpControlPlane:
            enabled: true
          bpf:
            masquerade: true
          routingMode: native
          autoDirectNodeRoutes: false
          ipv4NativeRoutingCIDR: "10.245.0.0/16"
          loadBalancer:
            mode: dsr
            algorithm: maglev
          operator:
            replicas: 1
          hubble:
            relay:
              enabled: true
            ui:
              enabled: false
          cgroup:
            autoMount:
              enabled: false
            hostRoot: /sys/fs/cgroup
          securityContext:
            capabilities:
              ciliumAgent:
                - CHOWN
                - KILL
                - NET_ADMIN
                - NET_RAW
                - IPC_LOCK
                - SYS_ADMIN
                - SYS_RESOURCE
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
              cleanCiliumState:
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_RESOURCE
    - repoURL: https://github.com/kerbatek/gitops.git
      targetRevision: main
      path: k8s/infra/cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
