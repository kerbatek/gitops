apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argocd-image-updater
      targetRevision: 1.1.1
      helm:
        valuesObject:
          config:
            git.user: argocd-image-updater
            git.email: noreply@mrembiasz.pl
            git.commit-message-template: |
              chore: bump {{ .AppName }} image

              {{ range .AppChanges -}}
              updates {{ .Image }} from {{ .OldTag }} to {{ .NewTag }}
              {{ end -}}
            registries:
              - name: GitHub Container Registry
                api_url: https://ghcr.io
                prefix: ghcr.io
                ping: no
                credentials: pullsecret:argocd/ghcr-creds
                defaultns: library
    - repoURL: https://github.com/kerbatek/gitops.git
      targetRevision: main
      path: k8s/infra/argocd-image-updater
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
