apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kerbatek/portfolio.git
    targetRevision: main
    path: deploy/helm/portfolio
    helm:
      valuesObject:
        frontend:
          replicas: 3
        backend:
          replicas: 3
        ingress:
          host: mrembiasz.pl
          tls:
            secretName: portfolio-tls
            clusterIssuer: letsencrypt-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
