apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: main-pool
spec:
  blocks:
    - cidr: "10.1.128.0/26"

---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-url-shortener-cp-1
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: url-shortener-cp-1
  bgpInstances:
    - name: main
      localASN: 65201
      peers:
        - name: mikrotik
          peerASN: 64513
          peerAddress: "10.0.217.0"
          peerConfigRef:
            name: mikrotik-peer-config

---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-url-shortener-cp-2
spec:
