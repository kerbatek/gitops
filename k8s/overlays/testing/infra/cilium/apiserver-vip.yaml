apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: apiserver-vip-pool
spec:
  blocks:
    - cidr: "10.0.216.5/32"

---
apiVersion: v1
kind: Service
metadata:
  name: apiserver-vip
  namespace: kube-system
  annotations:
    service.cilium.io/lb-ipam-ips: "10.0.216.5"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: https
      port: 6443
      targetPort: 6443
      protocol: TCP
  selector:
    component: kube-apiserver
