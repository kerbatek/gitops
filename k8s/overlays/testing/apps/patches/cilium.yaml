apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.17.1
      helm:
        valuesObject:
          kubeProxyReplacement: true
          k8sServiceHost: "10.0.216.5"
          k8sServicePort: "6443"
          ipam:
            mode: kubernetes
          bgpControlPlane:
            enabled: true
          bpf:
            masquerade: true
          loadBalancer:
            mode: dsr
            algorithm: maglev
          operator:
            replicas: 1
          hubble:
            relay:
              enabled: true
            ui:
              enabled: false
    - repoURL: https://github.com/kerbatek/gitops.git
      targetRevision: testing
      path: k8s/overlays/testing/infra/cilium
